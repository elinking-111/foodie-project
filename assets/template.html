<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孔一一の吃货搭子 | 吃喝玩乐指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFF8F1;--bg-alt:#FFEEDB;--card:#FFFDF8;--surface:#FFF3E6;
  --primary:#FF7A45;--primary-strong:#F05A28;--primary-light:#FFD1B8;
  --accent:#FFB64C;--sage:#72BE97;--sage-light:#E8FFF4;--sky:#8FD9FF;--berry:#FF99AF;
  --dark:#402516;--muted:#8E6A56;--light-border:rgba(215,167,132,0.28);
  --shadow:0 18px 40px rgba(190,116,71,0.08);
  --shadow-hover:0 24px 52px rgba(190,116,71,0.16);
  --inset-highlight:inset 0 1px 0 rgba(255,255,255,0.88);
}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit','Noto Sans SC',sans-serif;
  background:var(--bg);color:var(--dark);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(circle at top left,rgba(255,182,76,0.18),transparent 24%),
    radial-gradient(circle at 85% 12%,rgba(255,122,69,0.16),transparent 18%),
    radial-gradient(circle at 75% 72%,rgba(143,217,255,0.14),transparent 24%),
    linear-gradient(180deg,#FFF9F3 0%,#FFF5EC 46%,#FFF8F1 100%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:
    radial-gradient(circle at 12% 24%,rgba(255,255,255,0.8),transparent 16%),
    radial-gradient(circle at 88% 14%,rgba(255,255,255,0.72),transparent 14%);
}
::selection{background:var(--primary-light);color:var(--dark)}

/* Hero */
.hero{
  padding:34px 24px 28px;position:relative;
}
.hero-shell{
  max-width:1200px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1.08fr) minmax(320px,0.92fr);
  gap:28px;align-items:center;padding:34px;border-radius:34px;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at top left,rgba(255,255,255,0.96),transparent 30%),
    linear-gradient(135deg,rgba(255,244,232,0.96) 0%,rgba(255,236,214,0.92) 52%,rgba(255,245,234,0.94) 100%);
  border:1px solid rgba(255,255,255,0.88);
  box-shadow:var(--shadow),var(--inset-highlight);
}
.hero-shell::before{
  content:'';position:absolute;inset:auto auto -80px -60px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,122,69,0.14),transparent 68%);
}
.hero-shell::after{
  content:'';position:absolute;top:-56px;right:-48px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(143,217,255,0.16),transparent 70%);
}
.hero-copy,.hero-visual{position:relative;z-index:1}
.hero-copy{
  display:flex;flex-direction:column;align-items:flex-start;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;
  background:rgba(255,255,255,0.88);border:1px solid rgba(255,255,255,0.92);
  box-shadow:var(--inset-highlight),0 12px 24px rgba(186,124,80,0.1);
  font-size:13px;letter-spacing:0.08em;color:var(--primary-strong);margin-bottom:18px;font-weight:700;position:relative;
}
.hero-badge::before{
  content:'';width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent) 0%,var(--primary) 100%);
  box-shadow:0 3px 8px rgba(255,122,69,0.32);
}
.hero h1{
  font-family:'Outfit','Noto Sans SC',sans-serif;
  font-size:clamp(2.7rem,6vw,4.8rem);font-weight:800;
  line-height:1.02;margin-bottom:14px;position:relative;letter-spacing:-0.05em;max-width:9ch;
}
.hero h1 .brush{
  position:relative;display:inline-block;
}
.hero h1 .brush::after{
  content:'';position:absolute;left:-2%;right:-2%;bottom:0.08em;height:0.6em;border-radius:999px;
  background:linear-gradient(135deg,rgba(255,182,76,0.38) 0%,rgba(255,122,69,0.24) 100%);
  z-index:-1;filter:blur(1px);
}
.hero-sub{
  max-width:34rem;font-size:1rem;line-height:1.75;color:var(--muted);letter-spacing:0.01em;
}
.hero-flavors{
  display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;
}
.hero-chip{
  padding:10px 14px;border-radius:999px;background:rgba(255,255,255,0.82);
  border:1px solid rgba(255,255,255,0.9);box-shadow:var(--inset-highlight),0 8px 18px rgba(200,137,86,0.08);
  font-size:13px;font-weight:600;color:var(--dark);
}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:24px;width:100%;
}
.hero-stat{
  text-align:left;padding:14px 16px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,0.94) 0%,rgba(255,248,241,0.88) 100%);
  border:1px solid rgba(255,255,255,0.92);box-shadow:var(--inset-highlight),0 14px 26px rgba(188,128,84,0.08);
}
.hero-stat .num{
  font-family:'Outfit','Noto Sans SC',sans-serif;font-size:2rem;font-weight:800;
  color:var(--primary-strong);line-height:1;
}
.hero-stat .label{font-size:11px;color:var(--muted);margin-top:7px;letter-spacing:0.14em;font-weight:700}
.hero-visual{
  min-height:320px;display:flex;align-items:center;justify-content:center;
}
.hero-orbs{
  position:relative;width:min(100%,430px);aspect-ratio:1/0.86;
}
.hero-orb{
  position:absolute;border-radius:34px;display:flex;align-items:flex-end;justify-content:flex-start;padding:18px;
  color:#fff;font-weight:800;letter-spacing:0.01em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 18px 30px rgba(190,116,71,0.14),0 4px 0 rgba(255,255,255,0.22);
}
.hero-orb .orb-label{display:block;font-size:1rem;line-height:1.1}
.hero-orb .orb-sub{display:block;margin-top:6px;font-size:0.72rem;opacity:0.88;font-weight:600}
.hero-orb.main{
  inset:16% 8% auto auto;width:220px;height:220px;border-radius:42px;
  background:linear-gradient(145deg,#FF9D6C 0%,#FF7A45 46%,#F1572B 100%);transform:rotate(10deg);
}
.hero-orb.coffee{
  inset:auto auto 3% 6%;width:164px;height:164px;
  background:linear-gradient(145deg,#FFD26F 0%,#FFB84C 56%,#F39D1B 100%);transform:rotate(-10deg);
}
.hero-orb.guide{
  inset:2% auto auto 4%;width:156px;height:156px;
  background:linear-gradient(145deg,#93E7BE 0%,#72BE97 58%,#4FAA81 100%);transform:rotate(-14deg);
}
.hero-orb.night{
  inset:auto 10% 6% auto;width:132px;height:132px;border-radius:30px;
  background:linear-gradient(145deg,#9DDFFF 0%,#74C9FF 58%,#4DA8F5 100%);transform:rotate(14deg);
}
.hero-orb .foodie-icon{
  position:absolute;top:18px;right:18px;transform:scale(1.12);
}
.hero-orb.guide .foodie-icon{transform:scale(1.02)}
.hero-orb.coffee .foodie-icon{transform:scale(0.96)}
.hero-orb.night .foodie-icon{transform:scale(0.86)}

/* Sticky bar */
.sticky-bar{
  position:sticky;top:0;z-index:500;background:rgba(255,248,241,0.7);
  padding-top:14px;padding-bottom:10px;backdrop-filter:blur(18px);
  box-shadow:0 2px 8px rgba(42,31,26,0);transition:box-shadow 0.3s,background 0.3s;
}
.sticky-bar.stuck{box-shadow:0 12px 30px rgba(190,116,71,0.08);background:rgba(255,248,241,0.9)}

/* Search */
.search-wrap{
  max-width:640px;margin:0 auto 0;padding:0 24px;position:relative;
}
.search-wrap input{
  width:100%;padding:18px 22px 18px 54px;border:1px solid rgba(255,255,255,0.92);
  border-radius:22px;font-size:15px;font-family:inherit;background:rgba(255,255,255,0.88);color:var(--dark);
  box-shadow:var(--inset-highlight),0 16px 32px rgba(190,116,71,0.08);transition:all 0.3s ease;outline:none;
}
.search-wrap input:focus{border-color:rgba(255,122,69,0.5);box-shadow:0 0 0 4px rgba(255,122,69,0.08),var(--inset-highlight),0 16px 32px rgba(190,116,71,0.1)}
.search-wrap input::placeholder{color:#BE9A82}
.search-icon{
  position:absolute;left:40px;top:50%;transform:translateY(-50%);
  color:var(--primary);pointer-events:none;font-size:17px;
}

/* Filters */
.filters{
  max-width:1200px;margin:12px auto 0;padding:0 24px;
}
.filter-section{margin-bottom:6px}
.filter-scroll{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-btn{
  flex-shrink:0;padding:10px 18px;border:1px solid rgba(255,255,255,0.9);
  border-radius:999px;font-size:13px;font-family:inherit;font-weight:700;
  background:rgba(255,255,255,0.82);color:var(--muted);cursor:pointer;transition:all 0.25s ease;white-space:nowrap;
  box-shadow:var(--inset-highlight),0 10px 18px rgba(191,132,88,0.07);
}
.filter-btn:hover{transform:translateY(-1px);color:var(--dark)}
.filter-btn.active{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-strong) 100%);color:#FFF;border-color:transparent;
  box-shadow:0 14px 22px rgba(240,90,40,0.22);
}
.filter-btn .emoji{margin-right:4px}
.region-btn{padding:12px 22px;font-size:14px;letter-spacing:0.02em}
.district-btn{padding:9px 16px;font-size:12px}
.area-btn{padding:8px 14px;font-size:12px}

/* Results info */
.results-info{
  max-width:1200px;margin:12px auto 10px;padding:0 24px;
  display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
}
.results-count{
  font-size:13px;color:var(--muted);padding:12px 16px;border-radius:18px;
  background:rgba(255,255,255,0.76);border:1px solid rgba(255,255,255,0.88);
  box-shadow:var(--inset-highlight),0 10px 18px rgba(191,132,88,0.06);
}
.results-count span{font-weight:700;color:var(--primary)}

/* Grid */
.grid{
  max-width:1200px;margin:0 auto;padding:0 24px 80px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}
@media(max-width:680px){.grid{grid-template-columns:1fr;gap:12px}}

/* Cards */
.card{
  background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,rgba(255,251,245,0.98) 100%);
  border-radius:28px;padding:22px;
  border:1px solid rgba(255,255,255,0.92);
  transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;cursor:default;
  animation:fadeUp 0.4s ease both;
  box-shadow:var(--shadow),var(--inset-highlight);
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0 0 auto 0;height:78px;
  background:linear-gradient(180deg,rgba(255,255,255,0.78) 0%,transparent 100%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-6px) scale(1.01);box-shadow:var(--shadow-hover),var(--inset-highlight);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.card-emoji{
  font-size:28px;line-height:1;flex-shrink:0;
  width:62px;height:62px;display:flex;align-items:center;justify-content:center;
  border-radius:20px;background:linear-gradient(145deg,#FFF6EC 0%,#FFE5CF 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.92),0 16px 24px rgba(202,141,91,0.16);
}
.foodie-icon{
  --icon-a:#FFB64C;--icon-b:#FF7A45;--icon-c:#FFF4DE;--icon-d:#8E4F2B;
  position:relative;width:42px;height:42px;display:block;filter:drop-shadow(0 8px 10px rgba(87,48,27,0.16));
}
.foodie-icon .shape,.foodie-icon .detail,.foodie-icon .detail::before,.foodie-icon .detail::after{
  position:absolute;display:block;content:'';
}
.foodie-icon .shape{
  background:linear-gradient(145deg,var(--icon-c) 0%,var(--icon-a) 46%,var(--icon-b) 100%);
  box-shadow:inset 0 4px 0 rgba(255,255,255,0.42),inset -6px -8px 0 rgba(126,59,23,0.08);
}
.foodie-icon .detail,.foodie-icon .detail::before,.foodie-icon .detail::after{
  background:rgba(255,255,255,0.9);box-shadow:0 2px 4px rgba(96,55,31,0.08);
}
.foodie-icon.coffee{--icon-a:#D49B67;--icon-b:#8D5A35;--icon-c:#FFE7C8;--icon-d:#6F4128}
.foodie-icon.coffee .shape{left:8px;top:13px;width:25px;height:20px;border-radius:6px 6px 12px 12px}
.foodie-icon.coffee .shape::after{content:'';position:absolute;right:-8px;top:4px;width:10px;height:11px;border:3px solid var(--icon-b);border-left:0;border-radius:0 8px 8px 0}
.foodie-icon.coffee .detail{left:11px;top:8px;width:18px;height:3px;border-radius:999px;background:var(--icon-d);opacity:.55}
.foodie-icon.restaurant{--icon-a:#FFD56E;--icon-b:#FF7A45;--icon-c:#FFF2C6;--icon-d:#FF7A45}
.foodie-icon.restaurant .shape{left:8px;top:8px;width:26px;height:26px;border-radius:50%}
.foodie-icon.restaurant .shape::after{content:'';position:absolute;left:7px;top:7px;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.82)}
.foodie-icon.restaurant .detail{left:4px;top:9px;width:3px;height:24px;border-radius:999px;background:var(--icon-d)}
.foodie-icon.restaurant .detail::after{left:31px;top:0;width:4px;height:24px;border-radius:999px;background:var(--icon-d)}
.foodie-icon.bar{--icon-a:#FF9DB6;--icon-b:#E9577A;--icon-c:#FFE4EC;--icon-d:#A94864}
.foodie-icon.bar .shape{left:10px;top:7px;width:22px;height:22px;clip-path:polygon(8% 0,92% 0,66% 56%,55% 56%,55% 84%,74% 84%,74% 100%,26% 100%,26% 84%,45% 84%,45% 56%)}
.foodie-icon.bar .detail{left:15px;top:11px;width:12px;height:5px;border-radius:999px;background:rgba(255,255,255,.75)}
.foodie-icon.bakery{--icon-a:#FFCA9D;--icon-b:#F0835F;--icon-c:#FFF1DF;--icon-d:#B96B45}
.foodie-icon.bakery .shape{left:8px;top:15px;width:27px;height:18px;border-radius:7px 7px 12px 12px}
.foodie-icon.bakery .shape::before{content:'';position:absolute;left:2px;top:-9px;width:11px;height:12px;border-radius:50%;background:linear-gradient(145deg,var(--icon-c),var(--icon-a))}
.foodie-icon.bakery .shape::after{content:'';position:absolute;right:2px;top:-9px;width:11px;height:12px;border-radius:50%;background:linear-gradient(145deg,var(--icon-c),var(--icon-a))}
.foodie-icon.bakery .detail{left:16px;top:20px;width:10px;height:3px;border-radius:999px;background:rgba(255,255,255,.82)}
.foodie-icon.culture{--icon-a:#9CDFFF;--icon-b:#5AAFF0;--icon-c:#EAF7FF;--icon-d:#4B91C9}
.foodie-icon.culture .shape{left:9px;top:11px;width:24px;height:19px;border-radius:3px 3px 7px 7px}
.foodie-icon.culture .shape::before{content:'';position:absolute;left:-2px;top:-8px;width:28px;height:8px;clip-path:polygon(50% 0,100% 100%,0 100%);background:linear-gradient(145deg,var(--icon-c),var(--icon-a))}
.foodie-icon.culture .detail{left:12px;top:18px;width:3px;height:12px;border-radius:999px;background:rgba(255,255,255,.86)}
.foodie-icon.culture .detail::before{left:7px;top:0;width:3px;height:12px;border-radius:999px}
.foodie-icon.culture .detail::after{left:14px;top:0;width:3px;height:12px;border-radius:999px}
.foodie-icon.explore{--icon-a:#9FE3B8;--icon-b:#4FAA81;--icon-c:#EAFFF3;--icon-d:#3F8C67}
.foodie-icon.explore .shape{left:9px;top:8px;width:24px;height:26px;border-radius:50% 50% 48% 48%;clip-path:polygon(50% 100%,20% 58%,20% 25%,50% 0,80% 25%,80% 58%)}
.foodie-icon.explore .detail{left:16px;top:14px;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.84)}
.foodie-icon.leisure{--icon-a:#D8B8FF;--icon-b:#A66AE0;--icon-c:#F4EAFF;--icon-d:#7D4FB0}
.foodie-icon.leisure .shape{left:12px;top:8px;width:18px;height:25px;border-radius:999px 999px 8px 8px}
.foodie-icon.leisure .shape::after{content:'';position:absolute;left:4px;bottom:-4px;width:10px;height:7px;border-radius:50%;background:linear-gradient(145deg,var(--icon-a),var(--icon-b))}
.foodie-icon.leisure .detail{left:27px;top:8px;width:4px;height:23px;border-radius:999px;background:var(--icon-d)}
.foodie-icon.leisure .detail::before{right:0;top:0;width:10px;height:4px;border-radius:999px;background:var(--icon-d)}
.card-title-wrap{flex:1;min-width:0}
.card-name{
  font-family:'Outfit','Noto Sans SC',sans-serif;font-size:18px;font-weight:800;
  line-height:1.28;margin-bottom:4px;letter-spacing:-0.02em;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-name-en{font-size:12px;color:var(--muted);font-weight:500}
.card-top-right{
  position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:6px;
}
.card-visited{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(114,190,151,0.16);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(79,170,129,0.5);transition:all 0.25s ease;flex-shrink:0;
}
.card-visited:hover{background:rgba(114,190,151,0.22);color:#3C9A70}
.card-visited.checked{
  background:linear-gradient(135deg,#8CDEB6 0%,#4FAA81 100%);color:#FFF;
  box-shadow:0 8px 14px rgba(79,170,129,0.28);
}
.card-recommend{
  font-size:10px;font-weight:700;letter-spacing:0.4px;
  background:rgba(255,255,255,0.84);color:#8A7767;padding:6px 10px;border-radius:999px;
  line-height:1.4;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s ease;
  box-shadow:0 8px 16px rgba(191,132,88,0.1);
}
.card-recommend:hover{background:rgba(255,255,255,0.98);color:var(--dark);transform:translateY(-1px)}
.card-recommend.active{background:linear-gradient(135deg,rgba(255,182,76,0.26) 0%,rgba(255,122,69,0.2) 100%);color:var(--primary-strong)}
.card-discussion-actions{
  display:flex;align-items:center;gap:8px;margin-top:16px;
  flex-wrap:wrap;
  padding:7px;
  border-radius:22px;
  background:linear-gradient(180deg,rgba(255,247,238,0.88) 0%,rgba(255,241,228,0.72) 100%);
  border:1px solid rgba(255,255,255,0.58);
}
.card-like-btn{
  appearance:none;border:none;border-radius:16px;
  padding:8px 10px 8px 9px;font-size:12px;font-weight:800;font-family:inherit;
  background:rgba(255,255,255,0.82);color:#4F6B5D;cursor:pointer;transition:all 0.22s ease;
  display:inline-flex;align-items:center;gap:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 10px 18px rgba(79,170,129,0.08);
}
.card-like-btn:hover{
  transform:translateY(-2px);
  background:#FFF;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.94),0 14px 22px rgba(79,170,129,0.14);
}
.card-like-btn:active{
  transform:translateY(0) scale(0.98);
}
.card-like-btn.active{
  background:linear-gradient(135deg,#EAFBF2 0%,#D6F3E4 100%);
  color:#317D59;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 12px 20px rgba(79,170,129,0.16);
}
.like-btn-label{
  display:inline-flex;align-items:center;gap:6px;
}
.like-mark{
  min-width:24px;height:24px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#8CDEB6 0%,#4FAA81 100%);
  color:#FFF;font-size:11px;font-weight:900;letter-spacing:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.38),0 7px 12px rgba(79,170,129,0.22);
}
.like-count-badge{
  min-width:24px;height:24px;padding:0 8px;border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(91,123,106,0.10);color:var(--sage);font-size:11px;font-weight:800;
}
.card-like-btn.active .like-count-badge{
  background:var(--sage);color:#FFF;
}
.card-comment-btn,.comment-switch-btn{
  appearance:none;border:none;border-radius:14px;
  padding:8px 10px 8px 12px;font-size:12px;font-weight:700;font-family:inherit;
  background:rgba(196,87,58,0.10);
  color:#A55437;cursor:pointer;transition:all 0.22s ease;
  display:inline-flex;align-items:center;gap:10px;
}
.card-comment-btn:hover,.comment-switch-btn:hover{
  transform:translateY(-1px);
  background:rgba(196,87,58,0.14);
}
.card-comment-btn.active{
  background:rgba(42,31,26,0.90);color:#FFF;
}
.comment-btn-label{
  display:inline-flex;align-items:center;gap:6px;
}
.comment-mark{
  min-width:24px;height:24px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(196,87,58,0.12);color:#A55437;font-size:11px;font-weight:900;
}
.comment-mark::before{content:'聊'}
.card-comment-btn.active .comment-mark{background:rgba(255,255,255,0.18);color:#FFF}
.comment-count-badge{
  min-width:24px;height:24px;padding:0 8px;border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(196,87,58,0.12);color:#A55437;font-size:11px;font-weight:700;
}
.comment-count-badge.has-comments{
  background:#FFF;color:var(--primary-strong);
}
.card-comment-btn.active .comment-count-badge{
  background:rgba(255,255,255,0.18);color:#FFF;
}
.card-discussion{
  margin-top:14px;padding-top:14px;border-top:1px solid var(--light-border);
}
.card-discussion-header{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  margin-bottom:8px;flex-wrap:wrap;
}
.card-discussion-title{
  font-family:'Outfit','Noto Sans SC',sans-serif;font-size:15px;font-weight:800;color:var(--dark);
}
.card-discussion-meta{
  font-size:12px;color:var(--muted);
}
.card-discussion-mount{
  min-height:220px;
}
.firebase-comment-actions{
  display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:12px;
}
.firebase-comment-action-btn{
  border:none;border-radius:999px;padding:8px 12px;background:#F5ECE3;color:var(--accent);
  font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:transform .18s ease,background .18s ease,color .18s ease;
}
.firebase-comment-action-btn:hover{
  transform:translateY(-1px);background:#EADBCB;
}
.firebase-comment-action-btn.delete{
  background:#F8EEEA;color:#B45A40;
}
.firebase-comment-action-btn.delete:hover{
  background:#F0DDD5;
}
/* Map toggle */
.map-toggle-btn{
  padding:9px 16px;border:1px solid rgba(255,255,255,0.86);border-radius:999px;font-size:12px;font-family:inherit;
  cursor:pointer;background:rgba(255,255,255,0.78);color:var(--muted);transition:all 0.2s;font-weight:700;
  box-shadow:var(--inset-highlight),0 10px 18px rgba(191,132,88,0.08);
}
.map-toggle-btn:hover{color:var(--dark);transform:translateY(-1px)}
.map-toggle-btn.active{background:linear-gradient(135deg,#8CDEB6 0%,#4FAA81 100%);color:#FFF;border-color:transparent}

/* Map */
#mapContainer{
  max-width:1200px;margin:0 auto 20px;padding:0 24px;display:none;position:relative;
}
#map{
  width:100%;height:70vh;border-radius:16px;overflow:hidden;
  border:1px solid var(--light-border);box-shadow:var(--shadow);
}
.map-jump{
  position:absolute;top:12px;left:40px;z-index:450;display:flex;gap:4px;
  background:rgba(255,255,255,0.92);border-radius:10px;padding:4px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);backdrop-filter:blur(4px);
}
.map-jump-btn{
  padding:5px 14px;border:none;border-radius:8px;font-size:12px;font-family:inherit;
  cursor:pointer;background:transparent;color:var(--muted);transition:all 0.2s;font-weight:600;
}
.map-jump-btn:hover{background:var(--bg);color:var(--dark)}
.map-jump-btn.active{background:var(--primary);color:#FFF}
.map-popup .popup-name{font-family:'Outfit','Noto Sans SC',sans-serif;font-weight:800;font-size:14px;margin-bottom:4px}
.map-popup .popup-cat{font-size:11px;color:var(--primary);margin-bottom:2px}
.map-popup .popup-area{font-size:11px;color:var(--sage)}
.map-popup .popup-desc{font-size:11px;color:var(--muted);margin-top:3px}
.map-popup .popup-star{color:var(--primary);font-size:10px;font-weight:600}

/* Card actions — small icons, bottom-right corner, same line as tags */
/* Visited badge on card */
.card.is-visited{
  box-shadow:inset 0 0 0 1px rgba(91,123,106,0.18), var(--shadow);
}
/* Status filter */
.status-btn.active-visited{background:var(--sage);color:#FFF;border-color:var(--sage)}
.status-btn.active-unvisited{background:var(--accent);color:#FFF;border-color:var(--accent)}
.card-desc{
  font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{
  display:inline-block;padding:5px 10px;border-radius:999px;
  font-size:11px;font-weight:700;letter-spacing:0.2px;
}
.tag-category{background:#FFF0E7;color:var(--primary-strong)}
.tag-area{background:var(--sage-light);color:#42936C}
.tag-feature{background:#FFF5D8;color:#C48116}

/* Category card colors */
.card[data-cat="coffee"] .card-emoji{background:linear-gradient(145deg,#FFF1E5 0%,#FFD2B2 100%)}
.card[data-cat="restaurant"] .card-emoji{background:linear-gradient(145deg,#FFF6E6 0%,#FFD89A 100%)}
.card[data-cat="bar"] .card-emoji{background:linear-gradient(145deg,#FFEAF2 0%,#FFC2D5 100%)}
.card[data-cat="bakery"] .card-emoji{background:linear-gradient(145deg,#FFF1EE 0%,#FFC7BA 100%)}
.card[data-cat="culture"] .card-emoji{background:linear-gradient(145deg,#EEF7FF 0%,#BFE8FF 100%)}
.card[data-cat="explore"] .card-emoji{background:linear-gradient(145deg,#EBFFF4 0%,#BCEED5 100%)}
.card[data-cat="leisure"] .card-emoji{background:linear-gradient(145deg,#FFF0F5 0%,#FFD0E0 100%)}

/* Section divider */
.section-divider{
  grid-column:1/-1;text-align:center;padding:20px 0 8px;
  font-family:'Outfit','Noto Sans SC',sans-serif;font-size:18px;font-weight:800;
  color:var(--dark);position:relative;
}
.section-divider::after{
  content:'';display:block;width:40px;height:2px;
  background:var(--primary);margin:8px auto 0;border-radius:2px;opacity:0.4;
}

/* Empty */
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;
}
.empty-emoji{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;color:var(--muted)}

/* Recommend section */
.recommend-banner{
  max-width:1200px;margin:18px auto 18px;padding:0 24px;
}
.recommend-banner-inner{
  background:
    radial-gradient(circle at top right,rgba(255,255,255,0.76),transparent 30%),
    linear-gradient(135deg,rgba(255,246,235,0.98) 0%,rgba(255,231,209,0.96) 100%);
  border:1px solid rgba(255,255,255,0.86);border-radius:30px;padding:20px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  box-shadow:var(--inset-highlight),0 18px 30px rgba(191,132,88,0.1);
}
.recommend-banner-copy{min-width:0}
.recommend-banner-title{
  font-family:'Outfit','Noto Sans SC',sans-serif;
  font-size:1.06rem;font-weight:800;color:var(--dark);margin-bottom:4px;letter-spacing:-0.02em;
}
.recommend-banner-desc{
  display:block;font-size:13px;line-height:1.65;color:#9A7861;
}
.recommend-banner-btn{
  appearance:none;border:none;border-radius:999px;padding:12px 18px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-strong) 100%);
  color:#FFF;font:inherit;font-size:13px;font-weight:900;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;box-shadow:0 14px 22px rgba(240,90,40,0.2);
  transition:transform 0.2s ease, box-shadow 0.2s ease;
  white-space:nowrap;
}
.recommend-banner-btn:hover{
  transform:translateY(-2px);box-shadow:0 18px 28px rgba(240,90,40,0.24);
}
.recommend-banner-btn:active{
  transform:translateY(0) scale(0.98);
}
.recommend-banner-btn.active{
  background:rgba(64,37,22,0.94);color:#FFF;box-shadow:0 16px 28px rgba(64,37,22,0.2);
}
.recommend-banner-meta{
  padding:5px 9px;border-radius:999px;background:rgba(255,255,255,0.18);
  font-size:11px;font-weight:700;
}
.global-discussion-shell{
  max-width:1200px;margin:0 auto 20px;padding:0 24px;display:none;
}
.global-discussion-shell.show{display:block}
.global-discussion-card{
  background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,rgba(255,251,245,0.96) 100%);
  border:1px solid rgba(255,255,255,0.9);border-radius:28px;
  padding:22px 0 26px;box-shadow:var(--shadow),var(--inset-highlight);
}
/* Giscus container */
.giscus-wrap{
  max-width:800px;margin:0 auto;padding:0 24px;
}
.giscus-status{
  max-width:800px;margin:0 auto 12px;padding:0 24px;
  font-size:13px;line-height:1.7;color:var(--muted);
}
.giscus-status strong{
  color:var(--dark);
}

/* Footer */
.footer{
  text-align:center;padding:48px 24px 42px;
  font-size:12px;color:var(--muted);letter-spacing:1px;
}
.admin-auth-bar{
  margin:0 auto 12px;display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;
}
.admin-auth-note{
  font-size:12px;color:#8F7F71;letter-spacing:0;
}
.admin-auth-btn{
  appearance:none;border:none;border-radius:999px;padding:8px 14px;
  background:rgba(42,31,26,0.08);color:var(--dark);font:inherit;font-size:12px;font-weight:700;cursor:pointer;
  transition:background 0.2s ease, transform 0.2s ease;
}
.admin-auth-btn:hover{
  background:rgba(42,31,26,0.12);transform:translateY(-1px);
}
.admin-auth-btn.primary{
  background:var(--dark);color:#FFF;
}
.admin-auth-btn.primary:hover{
  background:#4A3A2F;
}

/* Scroll to top */
.scroll-top{
  position:fixed;bottom:24px;right:24px;width:44px;height:44px;
  border-radius:50%;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-strong) 100%);color:#FFF;border:none;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(10px);transition:all 0.3s ease;
  box-shadow:0 14px 24px rgba(240,90,40,0.22);z-index:100;
}
.scroll-top.show{opacity:1;transform:translateY(0)}
.scroll-top:hover{transform:translateY(-2px)}

/* Card actions — small icons, bottom-right corner */
.card-actions{
  position:absolute;bottom:10px;right:12px;display:flex;gap:4px;
  opacity:0;transition:opacity 0.2s ease;
}
.card:hover .card-actions{opacity:1}
.card-action-btn{
  background:var(--bg);border:none;border-radius:50%;
  width:24px;height:24px;font-size:11px;cursor:pointer;transition:all 0.2s;
  color:var(--muted);display:flex;align-items:center;justify-content:center;padding:0;
}
.card-action-btn:hover{background:var(--light-border);color:var(--dark)}
.card-action-delete:hover{color:#c44;background:#fef5f5}
.card-user-badge{
  font-size:9px;font-weight:600;letter-spacing:0.3px;
  background:#EDE5DB;color:var(--muted);padding:2px 6px;border-radius:100px;line-height:1.4;
}

/* FAB — add button */
.fab{
  position:fixed;bottom:76px;right:24px;width:48px;height:48px;
  border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,var(--primary) 72%);color:#FFF;border:none;
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 26px rgba(240,90,40,0.26);z-index:100;
  transition:all 0.3s ease;
}
.fab:hover{transform:translateY(-2px) scale(1.06)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(64,37,22,0.2);backdrop-filter:blur(10px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;
}
.modal-overlay.show{display:flex}
.modal{
  background:linear-gradient(180deg,rgba(255,255,255,0.98) 0%,rgba(255,248,241,0.98) 100%);border-radius:30px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;box-shadow:0 26px 60px rgba(146,87,47,0.22);border:1px solid rgba(255,255,255,0.86);
  animation:modalIn 0.3s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:24px 24px 0;
}
.modal-title{
  font-family:'Outfit','Noto Sans SC',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.02em;
}
.modal-close{
  width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.86);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all 0.2s;box-shadow:var(--inset-highlight);
}
.modal-close:hover{color:var(--dark);transform:translateY(-1px)}
.modal-form{padding:20px 24px 24px}
.form-group{margin-bottom:14px}
.form-label{
  display:block;font-size:12px;font-weight:600;color:var(--muted);
  margin-bottom:5px;letter-spacing:0.5px;
}
.form-input,.form-select{
  width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,0.9);
  border-radius:16px;font-size:14px;font-family:inherit;color:var(--dark);
  background:rgba(255,255,255,0.84);outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  box-shadow:var(--inset-highlight);
}
.form-input:focus,.form-select:focus{border-color:rgba(255,122,69,0.44);box-shadow:0 0 0 3px rgba(255,122,69,0.08),var(--inset-highlight)}
.form-input::placeholder{color:#BBA99A}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-check{
  display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--dark);
}
.form-check input[type="checkbox"]{
  width:18px;height:18px;accent-color:var(--primary);cursor:pointer;
}
.modal-actions{
  display:flex;gap:10px;justify-content:flex-end;padding:0 24px 24px;
}
.btn{
  padding:11px 24px;border-radius:14px;font-size:14px;font-family:inherit;
  font-weight:600;cursor:pointer;transition:all 0.2s;border:none;
}
.btn-cancel{background:rgba(255,255,255,0.84);color:var(--muted);border:1px solid rgba(255,255,255,0.92);box-shadow:var(--inset-highlight)}
.btn-cancel:hover{color:var(--dark);transform:translateY(-1px)}
.btn-save{background:linear-gradient(135deg,var(--accent) 0%,var(--primary) 70%);color:#FFF;box-shadow:0 12px 22px rgba(240,90,40,0.2)}
.btn-save:hover{transform:translateY(-1px)}
.btn-danger{background:#FFF;color:#c44;border:1.5px solid #c44}
.btn-danger:hover{background:#c44;color:#FFF}
.btn-export{
  background:var(--bg);color:var(--muted);border:1.5px solid var(--light-border);
  padding:8px 16px;border-radius:10px;font-size:12px;font-family:inherit;
  cursor:pointer;transition:all 0.2s;
}
.btn-export:hover{background:var(--light-border);color:var(--dark)}

/* Calm visual pass: fewer competing colors, borders, and pill surfaces. */
body{
  background-image:linear-gradient(180deg,#FFF8F1 0%,#FFF4EA 48%,#FFF8F1 100%);
}
body::before{
  background:radial-gradient(circle at 18% 8%,rgba(255,255,255,0.74),transparent 22%);
}
.hero-shell{
  background:linear-gradient(135deg,rgba(255,249,242,0.96) 0%,rgba(255,241,229,0.9) 100%);
  border-color:rgba(255,255,255,0.58);
  box-shadow:0 18px 42px rgba(126,75,42,0.07);
}
.hero-shell::before,.hero-shell::after{opacity:0.36}
.hero-badge,.hero-chip,.hero-stat,.results-count,.search-wrap input,.filter-btn,.map-toggle-btn{
  border-color:transparent;
  box-shadow:0 10px 24px rgba(126,75,42,0.055);
}
.hero-chip{
  background:rgba(255,255,255,0.62);

}
.hero-flavors{display:none}
.hero-stat{
  background:rgba(255,255,255,0.72);
  box-shadow:none;
}
.hero-stat .num{color:#D9653A}
.hero-stat .label{color:#9A7D6A}
.hero-orb{
  color:#4A3021;
  box-shadow:0 18px 32px rgba(126,75,42,0.1);
}
.hero-orb .orb-sub{opacity:0.7}
.hero-orb.main{background:linear-gradient(145deg,#F4B37E 0%,#EA8A59 100%)}
.hero-orb.coffee{background:linear-gradient(145deg,#F5D79B 0%,#E9B866 100%)}
.hero-orb.guide{background:linear-gradient(145deg,#F0D4B9 0%,#DFAE82 100%)}
.hero-orb.night{background:linear-gradient(145deg,#E8C7A9 0%,#C99166 100%)}
.sticky-bar{
  background:rgba(255,248,241,0.82);
  box-shadow:none;
}
.sticky-bar.stuck{
  background:rgba(255,248,241,0.94);
  box-shadow:0 10px 28px rgba(126,75,42,0.06);
}
.search-icon{
  width:16px;height:16px;border:2px solid #9A7861;border-radius:50%;
  font-size:0;color:transparent;
}
.search-icon::after{
  content:'';position:absolute;width:8px;height:2px;border-radius:999px;
  background:#9A7861;right:-6px;bottom:-3px;transform:rotate(45deg);
}
.search-wrap input{
  background:rgba(255,255,255,0.76);
}
.search-wrap input:focus{
  border-color:transparent;
  box-shadow:0 0 0 3px rgba(217,101,58,0.08),0 12px 26px rgba(126,75,42,0.07);
}
.filters{margin-top:10px}
.filter-section{margin-bottom:4px}
.filter-scroll{gap:6px;padding-bottom:4px}
.filter-btn{
  background:rgba(255,255,255,0.62);
  color:#7D6555;
}
.filter-btn .emoji{display:none}
.filter-btn:hover{
  background:rgba(255,255,255,0.82);
  color:var(--dark);
}
.filter-btn.active,.status-btn.active-visited,.status-btn.active-unvisited,.map-toggle-btn.active{
  background:#4A3021;
  color:#FFF;
  border-color:transparent;
  box-shadow:0 10px 20px rgba(74,48,33,0.12);
}
.results-count{
  background:transparent;
  padding-left:0;
}
.results-count span{color:#D9653A}
.grid{gap:14px}
.card{
  background:rgba(255,255,255,0.76);
  border-color:transparent;
  box-shadow:0 14px 34px rgba(126,75,42,0.065);
}
.card::before{display:none}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 42px rgba(126,75,42,0.1);
}
.card.is-visited{
  box-shadow:0 14px 34px rgba(126,75,42,0.065);
}
.card-desc{
  margin:8px 0 12px;
  color:#8D7463;
  line-height:1.65;
  -webkit-line-clamp:2;
}
.card-emoji,
.card[data-cat="coffee"] .card-emoji,
.card[data-cat="restaurant"] .card-emoji,
.card[data-cat="bar"] .card-emoji,
.card[data-cat="bakery"] .card-emoji,
.card[data-cat="culture"] .card-emoji,
.card[data-cat="explore"] .card-emoji,
.card[data-cat="leisure"] .card-emoji{

.foodie-icon,
.foodie-icon.coffee,
.foodie-icon.restaurant,
.foodie-icon.bar,
.foodie-icon.bakery,
.foodie-icon.culture,
.foodie-icon.explore,

.foodie-icon .detail,.foodie-icon .detail::before,.foodie-icon .detail::after{box-shadow:none}
.card-visited{

.card-recommend{
  background:rgba(74,48,33,0.06);

}
.card-recommend.active{

}
.tag{
  background:rgba(74,48,33,0.055);

}
.tag-category,.tag-area,.tag-feature{

  color:#785E4E;
}
.card-discussion-actions{

.card-like-btn,.card-comment-btn,.comment-switch-btn{
  background:rgba(74,48,33,0.055);

.card-like-btn:hover,.card-comment-btn:hover,.comment-switch-btn:hover{

  commentGlobalHint:'<strong>推荐新店格式：</strong> 店名 + 区域 + 一句话点评。阅读评论不用登录，发表评论需要 GitHub 账号。',
  commentGlobalHintGoogle:'<strong>推荐新店格式：</strong> 店名 + 区域 + 一句话点评。阅读评论不用登录，发表评论支持 Google 登录。',
  commentBackToGlobal:'回到总留言区',

  commentViewingSuffix:'」的评论。',

  recommendBannerDesc:'阅读评论不用登录；发表评论需要 GitHub 账号授权。推荐入口已经前移，不用滑到页尾。',
  recommendBannerDescGoogle:'阅读评论不用登录；发表评论支持 Google 账号授权。推荐入口已经前移，不用滑到页尾。',
  recommendBannerAction:'推荐新店',
  recommendBannerMetaClosed:'去留言区',
  recommendBannerMetaOpen:'已展开',
};
const READONLY = false;
const DISCUSSION_COUNTS_URL = 'discussion-counts.json';
const DISCUSSION_COUNT_LS_KEY = 'foodie_discussion_counts';
const LIKE_STATE_LS_KEY = 'foodie_place_likes';
const GLOBAL_DISCUSSION_KEY = '__global__';
const GISCUS_CONFIG = {
  repo: 'elinking-111/foodie-project',
  repoId: 'R_kgDOSGf1mg',
  category: 'Announcements',
  categoryId: 'DIC_kwDOSGf1ms4C7PqV',
  theme: 'light_protanopia',
  lang: 'zh-CN',
};
const CAT_EMOJI={}, CAT_LABEL={};
CATEGORIES.forEach(c=>{ if(c.key!=='all'){CAT_EMOJI[c.key]=c.emoji; CAT_LABEL[c.key]=c.label;} });

// ── User state (localStorage) ──
const LS_KEY = 'foodie_user_state';
let userState = {};
function loadState(){ try{ userState=JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ userState={}; } }
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(userState)); }
function itemKey(d){ return (d.name+'|'+d.region+'|'+d.area).replace(/\s/g,''); }
function getState(d){ const s=userState[itemKey(d)]||{}; if(d.visited && s.visited===undefined) s.visited=true; return s; }
function setState(d,patch){ const k=itemKey(d); userState[k]=Object.assign(userState[k]||{},patch); saveState(); }

// ── User CRUD data (localStorage) ──
const UD_KEY = 'foodie_user_data';
function loadUserData(){
  try{ const d=JSON.parse(localStorage.getItem(UD_KEY)); return {added:d.added||[],edited:d.edited||{},deleted:d.deleted||[]}; }
  catch(e){ return {added:[],edited:{},deleted:[]}; }
}
function saveUserData(ud){ localStorage.setItem(UD_KEY, JSON.stringify(ud)); }
function generateItemId(){ return 'user_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

function getMergedData(){
  const ud=loadUserData();
  let merged=DATA.filter(d=>{
    const key=itemKey(d);
    const remoteEdit=firebasePlaceEdits[key];
    if(remoteEdit && remoteEdit.deleted) return false;
    return !ud.deleted.includes(key);
  });
  merged=merged.map(d=>{
    const key=itemKey(d);
    const remoteEdit=firebasePlaceEdits[key];
    const base=remoteEdit
      ? Object.assign({},d,extractFirebasePlaceItem(remoteEdit),{_source:'sync',_sourceKey:key})
      : Object.assign({},d,{_source:'sync',_sourceKey:key});
    const edits=ud.edited[key];
    return edits?Object.assign({},base,edits,{_source:'sync',_sourceKey:key}):base;
  });
  firebasePlaceAdds.forEach(d=>merged.push(Object.assign({},extractFirebasePlaceItem(d),{_source:'user',_id:d.id})));
  ud.added.forEach(d=>merged.push(Object.assign({},d,{_source:'user'})));
  return merged;
}
let _mergedCache=null;
function getCachedMerged(){ if(!_mergedCache) _mergedCache=getMergedData(); return _mergedCache; }
function invalidateCache(){ _mergedCache=null; }

// ── District hierarchy: district → sub-areas ──
const DISTRICT_MAP={
  '东城':['鼓楼/南锣','东四/北新桥','雍和宫/国子监','什刹海/地安门','五道营/安定门','隆福寺','东直门','王府井','前门/桥湾','天安门'],
  '西城':['西四/白塔寺','西单/宣武门','牛街/菜市口'],
  '朝阳':['三里屯/工体','亮马桥/蓝港','朝阳门/建国门','朝阳公园','望京','合生汇','十里堡','银泰','朝阳'],
  '海淀':['海淀','华熙/五棵松','西直门'],
  '丰台':['丰台'],
  '门头沟':['门头沟'],
  '顺义':['顺义'],
  '密云':['密云'],
  '怀柔':['怀柔'],
  '平谷':['平谷'],
  '延庆':['延庆'],
  '其他区':['其他'],
};
// Reverse map: sub-area → district
const AREA_TO_DISTRICT={};
Object.entries(DISTRICT_MAP).forEach(([dist,subs])=>subs.forEach(s=>AREA_TO_DISTRICT[s]=dist));

// ── Filter state ──
let activeRegion="all", activeCats=new Set(["all"]), activeDistrict=ALL_LABEL, activeArea=ALL_LABEL, activeStatus="all", searchQuery="";
let activeDiscussionTerm=null;
let globalDiscussionOpen=false;
let discussionCounts={};
let discussionLocalCounts={};
let likeState={};
let firebaseCommentBridge=null;
let firebaseCommentState={ready:false,configured:false,user:null,comments:[],likes:{},likedThreadKeys:[],likePendingKeys:[],error:null,loading:true,loginPending:false,postPending:false};
let firebaseThreadCounts={};
let firebaseThreadComments={};
let firebaseThreadLikes={};
let firebaseLikedThreads={};
let firebasePlaceEdits={};
let firebasePlaceAdds=[];
let discussionDrafts={};
let discussionTransferSource=null;

function isAdminUser(){
  return !!(firebaseCommentState.user && firebaseCommentState.user.isAdmin);
}
function canManagePlaces(){
  return useFirebaseComments() && isAdminUser();
}
function extractFirebasePlaceItem(item){
  return {
    name: item.name || '',
    nameEn: item.nameEn || '',
    cat: item.cat || 'restaurant',
    region: item.region || PRIMARY_REGION,
    area: item.area || OTHER_LABEL,
    desc: item.desc || '',
    star: !!item.star,
    tags: Array.isArray(item.tags) ? item.tags : [],
  };
}
function renderAdminAuthBar(){
  const bar=document.getElementById('adminAuthBar');
  if(!bar) return;
  if(!useFirebaseComments()){
    bar.innerHTML='';
    return;
  }
  if(canManagePlaces()){
    bar.innerHTML=`<span class="admin-auth-note">管理员已登录：${esc(firebaseCommentState.user.email||'')}</span><button class="admin-auth-btn primary" onclick="openModal()">直接添加卡片</button><button class="admin-auth-btn" onclick="logoutDiscussion()">退出</button>`;
    return;
  }
  if(firebaseCommentState.user){
    bar.innerHTML=`<span class="admin-auth-note">当前账号 ${esc(firebaseCommentState.user.email||'')} 没有编辑权限</span><button class="admin-auth-btn" onclick="logoutDiscussion()">切换账号</button>`;
    return;
  }
  bar.innerHTML='<button class="admin-auth-btn" onclick="loginForAdmin()">管理员登录后可编辑餐厅</button>';
}
function updateAdminUi(){
  const fab=document.getElementById('fabBtn');
  if(fab) fab.style.display=canManagePlaces() ? '' : 'none';
  const eb=document.getElementById('exportBtn');
  if(eb) eb.style.display='none';
  renderAdminAuthBar();
}

function getDistrictsForRegion(region){
  if(region!==PRIMARY_REGION) return [];
  const set=new Set();
  getCachedMerged().forEach(d=>{
    if(d.region!==PRIMARY_REGION) return;
    const dist=AREA_TO_DISTRICT[d.area];
    if(dist) set.add(dist);
  });
  return [ALL_LABEL,...Array.from(set).sort((a,b)=>a.localeCompare(b,SORT_LOCALE))];
}
function getSubAreasForDistrict(district){
  if(district===ALL_LABEL) return [];
  const subs=DISTRICT_MAP[district]||[];
  const set=new Set();
  getCachedMerged().forEach(d=>{
    if(d.region!==PRIMARY_REGION) return;
    if(subs.includes(d.area)) set.add(d.area);
  });
  // Only show sub-area buttons if there are 2+ distinct sub-areas
  if(set.size<=1) return [];
  return [ALL_LABEL,...Array.from(set).sort((a,b)=>a.localeCompare(b,SORT_LOCALE))];
}
function getAreasForRegion(region){
  // For non-Beijing regions, flat area list
  if(region==='all'||region!==PRIMARY_REGION){
    const set=new Set();
    getCachedMerged().forEach(d=>{ if(region==='all'||d.region===region){ if(d.area) set.add(d.area); } });
    return [ALL_LABEL,...Array.from(set).sort((a,b)=>{ if(a===OTHER_LABEL)return 1; if(b===OTHER_LABEL)return -1; return a.localeCompare(b,SORT_LOCALE); })];
  }
  return [];
}

function updateStats(){
  const md=getCachedMerged();
  document.getElementById('statTotal').textContent=md.length;
  document.getElementById('statEat').textContent=md.filter(d=>d.region==="北京").length;
  document.getElementById('statPlay').textContent=md.filter(d=>d.region==="中国").length;
  document.getElementById('statTravel').textContent=md.filter(d=>d.region==="海外").length;
}
window.handleScrollTopAction=function(){
  window.scrollTo({top:0,behavior:'smooth'});
};
function init(){
  loadState();
  loadDiscussionCountCache();
  loadLikeState();
  updateStats();
  initFirebaseCommentBridge();
  document.getElementById('recommendBannerTitle').textContent=UI.recommendBannerTitle;
  document.getElementById('recommendBannerDesc').textContent=UI.recommendBannerDesc;
  document.getElementById('recommendBannerAction').textContent=UI.recommendBannerAction;

  // Region filters
  const regionWrap=document.getElementById('regionFilters');
  REGIONS.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='filter-btn region-btn'+(r.key==='all'?' active':'');
    btn.dataset.region=r.key;
    btn.innerHTML='<span class="emoji">'+r.emoji+'</span>'+r.label;
    btn.onclick=()=>{ activeRegion=r.key; activeDistrict=ALL_LABEL; activeArea=ALL_LABEL; buildDistrictFilters(); updateFilters(); render(); };
    regionWrap.appendChild(btn);
  });
  // Category filters
  const catWrap=document.getElementById('catFilters');
  CATEGORIES.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(c.key==='all'?' active':'');
    btn.dataset.cat=c.key;
    btn.innerHTML=(c.emoji?'<span class="emoji">'+c.emoji+'</span>':'')+c.label;
    btn.onclick=()=>{
      if(c.key==='all'){
        activeCats=new Set(['all']);
      } else {
        activeCats.delete('all');
        if(activeCats.has(c.key)){ activeCats.delete(c.key); }
        else { activeCats.add(c.key); }
        if(activeCats.size===0) activeCats=new Set(['all']);
      }
      updateFilters(); render();
    };
    catWrap.appendChild(btn);
  });
  buildDistrictFilters();
  updateAdminUi();
  // Init status filter default
  document.querySelectorAll('.status-btn').forEach(b=>{ b.classList.toggle('active',b.dataset.status==='all'); });
  // Search
  document.getElementById('searchInput').addEventListener('input',e=>{ searchQuery=e.target.value.trim().toLowerCase(); render(); });
  // Scroll to top
  window.addEventListener('scroll',()=>{
    document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400);
    document.getElementById('stickyBar').classList.toggle('stuck',window.scrollY>200);
  });
  window.addEventListener('message',handleGiscusMessage);
  render();
  loadDiscussionCounts();
}

function buildDistrictFilters(){
  const w=document.getElementById('districtFilters'); w.innerHTML='';
  if(activeRegion!==PRIMARY_REGION){ w.style.display='none'; buildAreaFilters(); return; }
  w.style.display='';
  getDistrictsForRegion(PRIMARY_REGION).forEach(d=>{
    const btn=document.createElement('button');
    btn.className='filter-btn district-btn'+(d===activeDistrict?' active':'');
    btn.dataset.district=d; btn.textContent=d;
    btn.onclick=()=>{ activeDistrict=d; activeArea=ALL_LABEL; buildAreaFilters(); updateFilters(); render(); };
    w.appendChild(btn);
  });
  buildAreaFilters();
}
function buildAreaFilters(){
  const w=document.getElementById('areaFilters'); w.innerHTML='';
  if(activeRegion===PRIMARY_REGION){
    // Show sub-areas for active district
    const subs=getSubAreasForDistrict(activeDistrict);
    if(!subs.length){ w.style.display='none'; return; }
    w.style.display='';
    subs.forEach(a=>{
      const btn=document.createElement('button');
      btn.className='filter-btn area-btn'+(a===activeArea?' active':'');
      btn.dataset.area=a; btn.textContent=a;
      btn.onclick=()=>{ activeArea=a; updateFilters(); render(); };
      w.appendChild(btn);
    });
  } else if(activeRegion!=='all'){
    // Non-Beijing: flat area list
    const areas=getAreasForRegion(activeRegion);
    if(areas.length<=1){ w.style.display='none'; return; }
    w.style.display='';
    areas.forEach(a=>{
      const btn=document.createElement('button');
      btn.className='filter-btn area-btn'+(a===activeArea?' active':'');
      btn.dataset.area=a; btn.textContent=a;
      btn.onclick=()=>{ activeArea=a; updateFilters(); render(); };
      w.appendChild(btn);
    });
  } else {
    w.style.display='none';
  }
}

window.setStatusFilter=function(s){
  activeStatus=s;
  document.querySelectorAll('.status-btn').forEach(b=>{
    b.classList.remove('active','active-visited','active-unvisited');
    if(b.dataset.status===s){
      b.classList.add(s==='visited'?'active-visited':s==='unvisited'?'active-unvisited':'active');
    }
  });
  render();
};

function updateFilters(){
  document.querySelectorAll('#regionFilters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.region===activeRegion));
  document.querySelectorAll('#catFilters .filter-btn').forEach(b=>b.classList.toggle('active',activeCats.has(b.dataset.cat)));
  document.querySelectorAll('#districtFilters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.district===activeDistrict));
  document.querySelectorAll('#areaFilters .filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.area===activeArea));
}

function render(){
  invalidateCache();
  updateStats();
  const grid=document.getElementById('grid');
  let filtered=getCachedMerged().filter(d=>{
    if(activeRegion!=='all' && d.region!==activeRegion) return false;
    if(!activeCats.has('all') && !activeCats.has(d.cat)) return false;
    // Two-level: district then sub-area (Beijing only)
    if(activeRegion===PRIMARY_REGION && activeDistrict!==ALL_LABEL){
      const subs=DISTRICT_MAP[activeDistrict]||[];
      if(!subs.includes(d.area)) return false;
      if(activeArea!==ALL_LABEL && d.area!==activeArea) return false;
    } else if(activeArea!==ALL_LABEL && d.area!==activeArea) return false;
    if(activeStatus==='visited' && !getState(d).visited) return false;
    if(activeStatus==='unvisited' && getState(d).visited) return false;
    if(searchQuery){
      const hay=(d.name+d.nameEn+d.desc+d.area+d.region+(d.tags||[]).join('')+(CAT_LABEL[d.cat]||'')).toLowerCase();
      return hay.includes(searchQuery);
    }
    return true;
  });

  // Sort: visited first, then by name
  filtered.sort((a,b)=>{
    const va=getState(a).visited?0:1, vb=getState(b).visited?0:1;
    if(va!==vb) return va-vb;
    return 0; // preserve original order within each group
  });
  if(activeDiscussionTerm && !filtered.some(d=>getDiscussionTerm(d)===activeDiscussionTerm)) activeDiscussionTerm=null;

  document.getElementById('resultCount').textContent=filtered.length;
  if(!filtered.length){
    grid.innerHTML='<div class="empty"><div class="empty-emoji">&#x1F50D;</div><div class="empty-text">'+UI.emptyText+'</div></div>';
    renderDiscussion();
    return;
  }

  let html='', delay=0;
  filtered.forEach((d,idx)=>{
    const catLabel=CAT_LABEL[d.cat]||'';
    const st=getState(d);
    const visited=st.visited;

    html+=`<div class="card${visited?' is-visited':''}" data-cat="${d.cat}" data-idx="${idx}" style="animation-delay:${Math.min(delay,600)}ms">`;
    // Top-right: visited check + note star
    html+='<div class="card-top-right">';
    const isStarred=getState(d).star!==undefined?getState(d).star:d.star;
    html+=`<button class="card-recommend${isStarred?' active':''}" onclick="toggleStar(${idx})">${UI.recommend}</button>`;
    html+=`<button class="card-visited${visited?' checked':''}" onclick="toggleVisited(this,${idx})" title="${visited?UI.markUnvisited:UI.markVisited}">&#10003;</button>`;
    html+='</div>';
    // Header
    html+='<div class="card-header">';
    html+=`<div class="card-emoji">${renderFoodieIcon(d.cat)}</div>`;
    html+='<div class="card-title-wrap">';
    html+=`<div class="card-name">${esc(d.name)}</div>`;
    if(d.nameEn) html+=`<div class="card-name-en">${esc(d.nameEn)}</div>`;
    html+='</div></div>';
    if(d.desc && d.desc!==d.area) html+=`<div class="card-desc">${esc(d.desc)}</div>`;
    // Tags
    html+='<div class="card-tags">';
    html+=`<span class="tag tag-category">${catLabel}</span>`;
    if(activeRegion==='all') html+=`<span class="tag tag-area">${esc(d.region)}</span>`;
    if(d.area && d.area!==OTHER_LABEL) html+=`<span class="tag tag-area">${esc(d.area)}</span>`;
    (d.tags||[]).slice(0,2).forEach(t=>{ html+=`<span class="tag tag-feature">${esc(t)}</span>`; });
    html+='</div>';
    const discussionTerm=getDiscussionTerm(d);
    const discussionOpen=activeDiscussionTerm===discussionTerm;
    const discussionCount=getDiscussionCount(discussionTerm);
    const likeCount=getLikeCount(discussionTerm);
    const liked=hasLiked(discussionTerm);
    const likePending=useFirebaseComments() && isLikePending(discussionTerm);
    html+='<div class="card-discussion-actions">';
    html+=`<button class="card-like-btn${liked?' active':''}" data-discussion-term="${esc(discussionTerm)}" onclick="toggleThumb(${idx})" aria-pressed="${liked?'true':'false'}" ${likePending?'disabled':''}><span class="like-btn-label"><span class="like-mark" aria-hidden="true">赞</span>${likePending?'处理中...':liked?UI.likeActionActive:UI.likeAction}</span><span class="like-count-badge${likeCount>0?' has-likes':''}">${likeCount}</span></button>`;
    html+=`<button class="card-comment-btn${discussionOpen?' active':''}" data-discussion-term="${esc(discussionTerm)}" onclick="toggleDiscussion(${idx})"><span class="comment-btn-label"><span class="comment-mark" aria-hidden="true"></span>${discussionOpen?UI.commentClose:UI.commentOpen}</span><span class="comment-count-badge${discussionCount>0?' has-comments':''}">${discussionCount}</span></button>`;
    html+='</div>';
    if(discussionOpen){
      html+='<div class="card-discussion">';
      html+=`<div class="card-discussion-header"><div class="card-discussion-title">${esc(d.name)}${UI.commentSuffix}</div><div class="card-discussion-meta">${esc(getDiscussionMeta(d))}</div></div>`;
      html+='<div class="card-discussion-mount" id="cardDiscussionMount"></div>';
      html+='</div>';
    }
    if(canManagePlaces()){
    html+='<div class="card-actions">';
    if(d._source==='user') html+='<span class="card-user-badge">'+UI.manual+'</span>';
    html+=`<button class="card-action-btn" onclick="openEditModal(${idx})" title="${UI.editTooltip}">&#9998;</button>`;
    html+=`<button class="card-action-btn card-action-delete" onclick="deleteItem(${idx})" title="${UI.deleteTooltip}">&times;</button>`;
    html+='</div>';
    }
    html+='</div>';
    delay+=30;
  });
  grid.innerHTML=html;
  // Store current filtered list for event handlers
  window._filtered=filtered;
  renderDiscussion();
  // Update map if visible
  if(mapVisible) renderMap();
}

// ── Event handlers ──
window.toggleVisited=function(btn,idx){
  const d=window._filtered[idx];
  const st=getState(d);
  setState(d,{visited:!st.visited});
  render();
};
window.toggleStar=function(idx){
  const d=window._filtered[idx];
  const st=getState(d);
  const current=st.star!==undefined?st.star:d.star;
  setState(d,{star:!current});
  render();
};
window.toggleThumb=function(idx){
  const d=window._filtered[idx];
  const term=getDiscussionTerm(d);
  if(useFirebaseComments()){
    if(!firebaseCommentBridge) return;
    firebaseCommentBridge.toggleLike(term).catch(e=>{
      alert((e && e.message) || '点赞失败');
    });
    return;
  }
  const current=getLikeSnapshot(term);
  likeState[term]={
    count: current.liked ? Math.max(0,current.count-1) : current.count+1,
    liked: !current.liked,
  };
  saveLikeState();
  updateLikeButton(term);
};
window.toggleDiscussion=function(idx){
  const d=window._filtered[idx];
  const term=getDiscussionTerm(d);
  globalDiscussionOpen=false;
  activeDiscussionTerm=activeDiscussionTerm===term?null:term;
  render();
  requestAnimationFrame(()=>{
    const mount=activeDiscussionTerm?document.getElementById('cardDiscussionMount'):document.getElementById('globalCommentMount');
    if(mount) mount.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
};
window.resetDiscussion=function(){
  activeDiscussionTerm=null;
  globalDiscussionOpen=true;
  render();
};
window.toggleGlobalDiscussion=function(forceOpen){
  activeDiscussionTerm=null;
  globalDiscussionOpen=typeof forceOpen==='boolean'?forceOpen:!globalDiscussionOpen;
  render();
  requestAnimationFrame(()=>{
    const shell=document.getElementById('globalDiscussionShell');
    if(shell && globalDiscussionOpen) shell.scrollIntoView({behavior:'smooth',block:'start'});
  });
};

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getDiscussionTerm(d){ return ['restaurant',d.region,d.area,d.name].join('|'); }
function getDiscussionMeta(d){
  return [CAT_LABEL[d.cat]||'', d.region, d.area && d.area!==OTHER_LABEL?d.area:''].filter(Boolean).join(' · ');
}
function getActiveDiscussionItem(){
  return (window._filtered||[]).find(d=>getDiscussionTerm(d)===activeDiscussionTerm)||null;
}
function renderFoodieIcon(cat){
  const iconClass=['coffee','restaurant','bar','bakery','culture','explore','leisure'].includes(cat) ? cat : 'restaurant';
  return `<span class="foodie-icon ${iconClass}"><i class="shape"></i><i class="detail"></i></span>`;
}
function stateIdsSignature(items){
  return (items||[]).map(item=>item && item.id ? item.id : '').join('|');
}
function placeEditsSignature(edits){
  return Object.keys(edits||{}).sort().map(key=>{
    const item=edits[key]||{};
    return [key,item.deleted,item.name,item.region,item.area,item.cat,item.desc,(item.tags||[]).join(',')].join(':');
  }).join('|');
}
function shouldRenderForFirebaseState(previous,next){
  if(!previous || !previous.ready) return true;
  const previousUser=previous.user||{};
  const nextUser=next.user||{};
  return previous.configured!==next.configured
    || previous.loading!==next.loading
    || previous.loginPending!==next.loginPending
    || previous.postPending!==next.postPending
    || previousUser.uid!==nextUser.uid
    || previousUser.isAdmin!==nextUser.isAdmin
    || stateIdsSignature(previous.comments)!==stateIdsSignature(next.comments)
    || placeEditsSignature(previous.placeEdits)!==placeEditsSignature(next.placeEdits)
    || stateIdsSignature(previous.placeAdds)!==stateIdsSignature(next.placeAdds);
}
function initFirebaseCommentBridge(){
  const attach=()=>{
    if(firebaseCommentBridge || !window.foodieComments) return;
    firebaseCommentBridge=window.foodieComments;
    firebaseCommentBridge.subscribe((state)=>{
      const previousState=firebaseCommentState;
      firebaseCommentState=state;
      rebuildFirebaseDiscussionIndex();
      rebuildFirebaseLikeIndex();
      firebasePlaceEdits=Object.assign({},state.placeEdits||{});
      firebasePlaceAdds=(state.placeAdds||[]).map(item=>Object.assign({},item));
      updateAdminUi();
      if(shouldRenderForFirebaseState(previousState,state)) render();
      else updateLikeButtons();
    });
  };
  if(window.foodieComments) attach();
  else window.addEventListener('foodie-comments-ready',attach,{once:true});
}
function useFirebaseComments(){
  return !!firebaseCommentState.configured;
}
function rebuildFirebaseDiscussionIndex(){
  const counts={};
  const byThread={};
  (firebaseCommentState.comments||[]).forEach(comment=>{
    if(!comment || !comment.threadKey) return;
    counts[comment.threadKey]=(counts[comment.threadKey]||0)+1;
    if(!byThread[comment.threadKey]) byThread[comment.threadKey]=[];
    byThread[comment.threadKey].push(comment);
  });
  Object.keys(byThread).forEach(key=>{
    byThread[key].sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0));
  });
  firebaseThreadCounts=counts;
  firebaseThreadComments=byThread;
}
function rebuildFirebaseLikeIndex(){
  firebaseThreadLikes=Object.assign({},firebaseCommentState.likes||{});
  firebaseLikedThreads={};
  (firebaseCommentState.likedThreadKeys||[]).forEach(term=>{ firebaseLikedThreads[term]=true; });
}
function loadDiscussionCountCache(){
  try{ discussionLocalCounts=JSON.parse(localStorage.getItem(DISCUSSION_COUNT_LS_KEY))||{}; }
  catch(e){ discussionLocalCounts={}; }
  discussionCounts=Object.assign({},discussionLocalCounts);
}
function loadLikeState(){
  try{ likeState=JSON.parse(localStorage.getItem(LIKE_STATE_LS_KEY))||{}; }
  catch(e){ likeState={}; }
}
function saveLikeState(){
  localStorage.setItem(LIKE_STATE_LS_KEY, JSON.stringify(likeState));
}
function getLikeSnapshot(term){
  const current=likeState[term]||{};
  return {
    count: Math.max(0, Number(current.count)||0),
    liked: !!current.liked,
  };
}
function getLikeCount(term){
  if(useFirebaseComments()) return firebaseThreadLikes[term]||0;
  return getLikeSnapshot(term).count;
}
function hasLiked(term){
  if(useFirebaseComments()) return !!firebaseLikedThreads[term];
  return getLikeSnapshot(term).liked;
}
function isLikePending(term){
  return !!((firebaseCommentState.likePendingKeys||[]).includes(term));
}
function updateLikeButtonElement(btn,term){
    const count=getLikeCount(term);
    const liked=hasLiked(term);
    const pending=useFirebaseComments() && isLikePending(term);
    const label=btn.querySelector('.like-btn-label');
    const badge=btn.querySelector('.like-count-badge');
    btn.classList.toggle('active',liked);
    btn.setAttribute('aria-pressed',liked?'true':'false');
    btn.disabled=!!pending;
    if(label) label.innerHTML=`<span class="like-mark" aria-hidden="true">赞</span>${pending?'处理中...':liked?UI.likeActionActive:UI.likeAction}`;
    if(badge){
      badge.textContent=String(count);
      badge.classList.toggle('has-likes',count>0);
    }
}
function updateLikeButton(term){
  if(!term) return;
  document.querySelectorAll('.card-like-btn[data-discussion-term]').forEach(btn=>{
    if(btn.dataset.discussionTerm!==term) return;
    updateLikeButtonElement(btn,term);
  });
}
function updateLikeButtons(){
  document.querySelectorAll('.card-like-btn[data-discussion-term]').forEach(btn=>{
    updateLikeButtonElement(btn,btn.dataset.discussionTerm);
  });
}
function saveDiscussionCountCache(){
  localStorage.setItem(DISCUSSION_COUNT_LS_KEY, JSON.stringify(discussionLocalCounts));
}
function getDiscussionCount(term){
  if(useFirebaseComments()) return firebaseThreadCounts[term]||0;
  return Number.isFinite(discussionCounts[term]) ? discussionCounts[term] : 0;
}
function setDiscussionCount(term,count){
  if(!term || !Number.isFinite(count)) return;
  discussionCounts[term]=count;
  discussionLocalCounts[term]=count;
  saveDiscussionCountCache();
  updateDiscussionCountBadge(term,count);
}
function updateDiscussionCountBadge(term,count){
  document.querySelectorAll('.card-comment-btn[data-discussion-term]').forEach(btn=>{
    if(btn.dataset.discussionTerm!==term) return;
    const badge=btn.querySelector('.comment-count-badge');
    if(!badge) return;
    badge.textContent=String(count);
    badge.classList.toggle('has-comments',count>0);
  });
}
async function loadDiscussionCounts(){
  try{
    const res=await fetch(`${DISCUSSION_COUNTS_URL}?v=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) return;
    const data=await res.json();
    const serverCounts=data && data.counts ? data.counts : {};
    const merged={};
    Object.keys(serverCounts).forEach(key=>{ merged[key]=serverCounts[key]; });
    Object.keys(discussionLocalCounts).forEach(key=>{ merged[key]=Math.max(merged[key]||0, discussionLocalCounts[key]||0); });
    discussionCounts=merged;
    render();
  }catch(e){
    console.warn('[discussion-counts] failed to load',e);
  }
}
function updateGlobalDiscussionButton(activeItem){
  const btn=document.getElementById('openGlobalDiscussionBtn');
  const meta=document.getElementById('globalDiscussionMeta');
  const desc=document.getElementById('recommendBannerDesc');
  if(!btn || !meta) return;
  const active=!activeItem && globalDiscussionOpen;
  btn.classList.toggle('active',active);
  meta.textContent=active?UI.recommendBannerMetaOpen:UI.recommendBannerMetaClosed;
  if(desc){
    desc.textContent=useFirebaseComments()?UI.recommendBannerDescGoogle:UI.recommendBannerDesc;
  }
}
function handleGiscusMessage(event){
  if(useFirebaseComments()) return;
  if(event.origin!=='https://giscus.app') return;
  const payload=event.data && event.data.giscus;
  const count=payload && payload.discussion && typeof payload.discussion.totalCommentCount==='number'
    ? payload.discussion.totalCommentCount
    : null;
  if(count===null) return;
  const term=activeDiscussionTerm || (globalDiscussionOpen ? GLOBAL_DISCUSSION_KEY : null);
  if(term) setDiscussionCount(term,count);
}
function mountGiscus(target,{mapping,term,title}){
  if(!target) return;
  target.innerHTML='';
  const script=document.createElement('script');
  script.src='https://giscus.app/client.js';
  script.async=true;
  script.crossOrigin='anonymous';
  script.setAttribute('data-repo',GISCUS_CONFIG.repo);
  script.setAttribute('data-repo-id',GISCUS_CONFIG.repoId);
  script.setAttribute('data-category',GISCUS_CONFIG.category);
  script.setAttribute('data-category-id',GISCUS_CONFIG.categoryId);
  script.setAttribute('data-mapping',mapping);
  script.setAttribute('data-strict',mapping==='specific'?'1':'0');
  script.setAttribute('data-reactions-enabled','1');
  script.setAttribute('data-emit-metadata','1');
  script.setAttribute('data-input-position','top');
  script.setAttribute('data-theme',GISCUS_CONFIG.theme);
  script.setAttribute('data-lang',GISCUS_CONFIG.lang);
  script.setAttribute('data-loading','lazy');
  if(mapping==='specific'){
    script.setAttribute('data-term',term);
    if(title) script.setAttribute('data-title',title);
  }
  target.appendChild(script);
}
function getCurrentDiscussionTerm(){
  return activeDiscussionTerm || (globalDiscussionOpen ? GLOBAL_DISCUSSION_KEY : null);
}
function formatCommentTime(ms){
  if(!ms) return '刚刚';
  const d=new Date(ms);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getUserInitial(name){
  return (name||'U').trim().slice(0,1).toUpperCase();
}
function escWithBreaks(s){
  return esc(s).replace(/\n/g,'<br>');
}
function renderCommentAuthor(user,nameClass='firebase-user-name'){
  const displayName=user && (user.displayName || user.email || 'Google 用户');
  const avatar=user && user.photoURL;
  return `${avatar?`<img class="firebase-user-avatar" src="${esc(avatar)}" alt="${esc(displayName)}">`:`<div class="firebase-user-avatar-fallback">${esc(getUserInitial(displayName))}</div>`}<div class="firebase-user-meta"><div class="${nameClass}">${esc(displayName)}</div></div>`;
}
function setModalSaveButtonLabel(label){
  const btn=document.getElementById('btnSave');
  if(btn) btn.textContent=label||'保存';
}
function getDiscussionComments(term){
  return firebaseThreadComments[term]||[];
}
function getDiscussionCommentById(term,commentId){
  return getDiscussionComments(term).find(comment=>comment.id===commentId)||null;
}
function inferRegionFromSuggestion(text){
  const value=String(text||'').trim();
  if(!value) return activeRegion!=='all' ? activeRegion : PRIMARY_REGION;
  if(REGIONS.some(region=>region.key===value && region.key!=='all')) return value;
  if(value===PRIMARY_REGION || AREA_TO_DISTRICT[value]) return PRIMARY_REGION;
  if(/上海|广州|深圳|杭州|南京|苏州|武汉|重庆|天津|西安|长沙|厦门|青岛|福州|成都|昆明|大理|哈尔滨|长春|沈阳|郑州|景德镇/.test(value)) return '中国';
  if(/巴厘|东京|大阪|京都|首尔|济州|巴黎|伦敦|纽约|洛杉矶|温哥华|悉尼|新加坡|曼谷|清迈|普吉|槟城|香港|澳门|台北|高雄|米兰|罗马|柏林|维也纳|雅典|布达佩斯|特拉维夫|摩洛哥|冰岛|迪拜/.test(value)) return '海外';
  return activeRegion!=='all' ? activeRegion : PRIMARY_REGION;
}
function buildPlaceDraftFromComment(comment){
  const body=String(comment && comment.body ? comment.body : '').trim();
  const lines=body.split(/\n+/).map(line=>line.trim()).filter(Boolean);
  const firstLine=lines[0]||'';
  const parts=firstLine.split(/\s*[+＋|｜]\s*/).map(part=>part.trim()).filter(Boolean);
  const name=(parts[0]||firstLine||'').trim();
  const locationHint=(parts[1]||'').trim();
  const extraInline=parts.length>2 ? parts.slice(2).join(' · ') : '';
  const multilineDesc=lines.length>1 ? lines.slice(1).join(' ') : '';
  const desc=(extraInline||multilineDesc||'').trim();
  let region=activeRegion!=='all' ? activeRegion : PRIMARY_REGION;
  let area=activeArea!==ALL_LABEL ? activeArea : OTHER_LABEL;
  if(locationHint){
    if(REGIONS.some(option=>option.key===locationHint && option.key!=='all')){
      region=locationHint;
      area=OTHER_LABEL;
    } else {
      region=inferRegionFromSuggestion(locationHint);
      area=locationHint;
      if(locationHint===region) area=OTHER_LABEL;
    }
  }
  return {
    name,
    nameEn:'',
    cat:'restaurant',
    region,
    area,
    desc,
    star:false,
    visited:false,
    tags:[],
  };
}
function renderFirebaseDiscussion(target,{term,title}){
  if(!target) return;

  const user=firebaseCommentState.user;
  const draft=discussionDrafts[term]||'';
  let html='<div class="firebase-discussion">';
  if(firebaseCommentState.error){
    html+=`<div class="firebase-comment-error">${esc(firebaseCommentState.error)}</div>`;
  }
  html+='<div class="firebase-discussion-toolbar">';
  html+='<div class="firebase-discussion-user">';
  if(user){
    html+=renderCommentAuthor(user);
    html+='<div class="firebase-user-note">已登录，可直接评论。Google 头像和昵称会随评论展示。</div>';
  } else {
    html+='<div class="firebase-user-avatar-fallback">G</div>';
    html+='<div class="firebase-user-meta"><div class="firebase-user-name">Google 登录后可评论</div><div class="firebase-user-note">阅读评论不需要登录。当前 MVP 仅支持 Google 登录发评论。</div></div>';
  }
  html+='</div>';
  html+='<div class="firebase-toolbar-actions">';
  if(user){
    html+=`<button class="firebase-logout-btn" onclick="logoutDiscussion()" ${firebaseCommentState.loginPending||firebaseCommentState.postPending?'disabled':''}>退出</button>`;
  } else {
    html+=`<button class="firebase-auth-btn" onclick="loginForDiscussion()" ${firebaseCommentState.loginPending?'disabled':''}>Google 登录</button>`;
  }
  html+='</div></div>';
  if(user){
    html+='<div class="firebase-discussion-box">';
    html+=`<textarea id="discussionComposer" oninput="updateDiscussionDraft(this.value)" placeholder="写下你的体验、推荐理由、避雷提示...">${esc(draft)}</textarea>`;
    html+='<div class="firebase-discussion-box-footer">';
    html+=`<div class="firebase-discussion-tip">评论会显示在「${esc(title)}」下，并同步更新按钮上的数字。</div>`;
    html+=`<button class="firebase-submit-btn" onclick="submitDiscussionComment()" ${firebaseCommentState.postPending?'disabled':''}>${firebaseCommentState.postPending?'发布中...':'发布评论'}</button>`;
    html+='</div></div>';
  }
  if(firebaseCommentState.loading && !comments.length){
    html+='<div class="firebase-comment-loading">正在加载评论...</div>';
  } else if(!comments.length){
    html+='<div class="firebase-comment-empty">还没有评论，来留第一条。</div>';
  } else {
    html+='<div class="firebase-comment-list">';
    comments.forEach(comment=>{
      const authorName=comment.authorName || '匿名用户';
      const avatar=comment.authorPhotoURL;
      const canPromote=canManagePlaces() && term===GLOBAL_DISCUSSION_KEY;
      const canDelete=canManagePlaces();
      html+='<div class="firebase-comment">';
      html+='<div class="firebase-comment-header">';
      html+='<div class="firebase-comment-author">';
      html+=avatar?`<img class="firebase-user-avatar" src="${esc(avatar)}" alt="${esc(authorName)}">`:`<div class="firebase-user-avatar-fallback">${esc(getUserInitial(authorName))}</div>`;
      html+=`<div class="firebase-comment-meta"><div class="firebase-user-name">${esc(authorName)}</div><div class="firebase-comment-time">${esc(formatCommentTime(comment.createdAtMs))}</div></div>`;
      html+='</div></div>';
      html+=`<div class="firebase-comment-body">${escWithBreaks(comment.body||'')}</div>`;
      if(canPromote || canDelete){
        html+='<div class="firebase-comment-actions">';
        if(canPromote) html+=`<button class="firebase-comment-action-btn" onclick="promoteDiscussionComment(${JSON.stringify(comment.id)})">转成推荐</button>`;
        if(canDelete) html+=`<button class="firebase-comment-action-btn delete" onclick="deleteDiscussionComment(${JSON.stringify(comment.id)})">删除留言</button>`;

window.promoteDiscussionComment=function(commentId){
  if(!canManagePlaces()){
    alert('请先用有权限的 Google 账号登录');
    return;
  }
  const term=getCurrentDiscussionTerm();
  if(term!==GLOBAL_DISCUSSION_KEY){
    alert('只有推荐新店留言区的评论可以直接转成推荐');
    return;
  }
  const comment=getDiscussionCommentById(term,commentId);
  if(!comment){
    alert('这条留言还没同步完成，请刷新后重试');
    return;
  }
  const item=buildPlaceDraftFromComment(comment);
  if(!item.name){
    alert('留言里没有可识别的店名，请先补充后再转成推荐');
    return;
  }
  openModal(item);
  discussionTransferSource={commentId:comment.id};

  }catch(e){

};
window.submitDiscussionComment=async function(){
  if(!firebaseCommentBridge || !firebaseCommentState.user) return;
  const term=getCurrentDiscussionTerm();
  const textarea=document.getElementById('discussionComposer');
  const body=(textarea ? textarea.value : discussionDrafts[term]||'').trim();
  if(!term || !body){ alert('请输入评论内容'); return; }
  const activeItem=getActiveDiscussionItem();
  const payload={
    threadKey: term,
    body,
    scope: activeItem ? 'place' : 'global',
    place: activeItem ? {
      name: activeItem.name,
      region: activeItem.region,
      area: activeItem.area,
      cat: activeItem.cat,
    } : null,
  };
  try{
    await firebaseCommentBridge.postComment(payload);
    discussionDrafts[term]='';
    if(textarea) textarea.value='';
  }catch(e){
    alert((e && e.message) || '评论发布失败');
  }
};

      });

        title:`${activeItem.name} · ${activeItem.region}${activeItem.area && activeItem.area!==OTHER_LABEL ? ' · '+activeItem.area : ''}`
      });

    return;
  }
  const name=document.getElementById('fName').value.trim();

    tags:document.getElementById('fTags').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),
  };
  try{
    if(!_editMode){
      item._id=generateItemId();
      await firebaseCommentBridge.savePlace({mode:'add',id:item._id,item});
    } else if(_editMode.source==='user'){
      item._id=_editMode.id;
      await firebaseCommentBridge.savePlace({mode:'add',id:_editMode.id,item});
    } else {
      await firebaseCommentBridge.savePlace({mode:'sync',sourceKey:_editMode.key,item});
    }

      try{

        closeModal();

        alert(`推荐已保存，但原留言删除失败：${(deleteError && deleteError.message) || '请稍后重试'}`);

function getFilteredItems(){
  return getCachedMerged().filter(d=>{
    if(activeRegion!=='all' && d.region!==activeRegion) return false;
    if(!activeCats.has('all') && !activeCats.has(d.cat)) return false;
    if(activeRegion===PRIMARY_REGION && activeDistrict!==ALL_LABEL){
      const subs=DISTRICT_MAP[activeDistrict]||[];
      if(!subs.includes(d.area)) return false;
      if(activeArea!==ALL_LABEL && d.area!==activeArea) return false;
    } else if(activeArea!==ALL_LABEL && d.area!==activeArea) return false;
    if(activeStatus==='visited' && !getState(d).visited) return false;
    if(activeStatus==='unvisited' && getState(d).visited) return false;
    if(searchQuery){
      const hay=(d.name+d.nameEn+d.desc+d.area+d.region+(d.tags||[]).join('')+(CAT_LABEL[d.cat]||'')).toLowerCase();
      return hay.includes(searchQuery);
    }
    return true;
  });
}

function renderMap(){
  const items=getFilteredItems();
  if(!mapInstance){
    mapInstance=L.map('map',{
      zoomControl:false,
      scrollWheelZoom:true,
      wheelDebounceTime:40,
      wheelPxPerZoomLevel:80,
      doubleClickZoom:true,
      touchZoom:true,
      dragging:true,
      inertia:true,
      zoomSnap:0.5,
      zoomDelta:0.5,
      minZoom:2,
      maxZoom:18,
    }).setView(MAP_DEFAULT.center,MAP_DEFAULT.zoom);
    // Zoom controls top-right
    L.control.zoom({position:'topright'}).addTo(mapInstance);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; <a href="https://carto.com/">CARTO</a>',maxZoom:19,subdomains:'abcd',
    }).addTo(mapInstance);
  }
  // Clear old markers
  mapMarkers.forEach(m=>mapInstance.removeLayer(m));
  mapMarkers=[];

  // Color by category
  const catColors={coffee:'#8B6914',restaurant:'#D4956A',bar:'#9B59B6',bakery:'#E8735A',culture:'#3498DB',explore:'#27AE60',leisure:'#E84393'};

  const bounds=[];
  items.forEach(d=>{
    let coords=AREA_COORDS[d.area];
    if(!coords) coords=AREA_COORDS[d.region] || REGION_CENTERS[d.region];
    if(!coords) return;
    // Add jitter so overlapping items spread out (less for overseas)
    const jitter=d.region===PRIMARY_REGION?0.006:0.15;
    const lat=coords[0]+(Math.random()-0.5)*jitter;
    const lng=coords[1]+(Math.random()-0.5)*jitter;
    const color=catColors[d.cat]||'#C4573A';
    const isStarred=getState(d).star!==undefined?getState(d).star:d.star;
    const visited=getState(d).visited;

    const size=d.region===PRIMARY_REGION?12:16;
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #FFF;box-shadow:0 2px 6px rgba(0,0,0,0.35);${visited?'':'opacity:0.6'}"></div>`,
      iconSize:[size,size],iconAnchor:[size/2,size/2],
    });
    const marker=L.marker([lat,lng],{icon:icon}).addTo(mapInstance);
    const popup=`<div class="map-popup">
      <div class="popup-name">${esc(d.name)}${d.nameEn?' <span style="font-weight:400;font-style:italic;font-size:12px">'+esc(d.nameEn)+'</span>':''}</div>
      <div class="popup-cat">${CAT_EMOJI[d.cat]||''} ${CAT_LABEL[d.cat]||''}</div>
      ${d.area&&d.area!==OTHER_LABEL?'<div class="popup-area">'+esc(d.region)+' · '+esc(d.area)+'</div>':'<div class="popup-area">'+esc(d.region)+'</div>'}
      ${isStarred?'<div class="popup-star">'+UI.popupStar+'</div>':''}
      ${d.desc?'<div class="popup-desc">'+esc(d.desc)+'</div>':''}
    </div>`;
    marker.bindPopup(popup,{maxWidth:240});
    mapMarkers.push(marker);
    bounds.push([lat,lng]);
  });

  if(bounds.length){
    if(activeRegion==='all'){
      // World view — center on items, low zoom so all points visible
      mapInstance.setView([35,60],3);
    } else {
      mapInstance.fitBounds(bounds,{padding:[40,40],maxZoom:14});
    }
  }
  // Fix map size after toggle
  setTimeout(()=>mapInstance.invalidateSize(),100);
}

window.mapJump=function(target){
  if(!mapInstance) return;
  const mj=MAP_JUMPS_DATA.find(j=>j.key===target);
  document.querySelectorAll('.map-jump-btn').forEach(b=>{
    const bj=MAP_JUMPS_DATA.find(j=>j.key===b.getAttribute('data-jump'));
    b.classList.toggle('active',bj&&bj.key===target);
  });
  if(mj) mapInstance.flyTo(mj.center,mj.zoom,{duration:0.8});
};

document.addEventListener('DOMContentLoaded',init);
</script>
<script type="module" src="firebase-comments.js"></script>
</body>
